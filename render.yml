services:
  - type: web
    name: fdih-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node dist/db/migrate.js && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DEMO_ORG_ID
        value: 11111111-1111-1111-1111-111111111111
      - key: STORAGE_TYPE
        value: s3
      - key: AWS_BUCKET_NAME
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_ENDPOINT
        sync: false
      - key: AI_PROVIDER
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: fdih-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BACKEND_INTERNAL_URL
        value: http://fdih-backend:3001
      - key: NEXT_PUBLIC_API_URL
        value: ""

