version: '3.8'
services:
  postgres:
    image: postgres:15
    ports: ['5432:5432']
    environment:
      POSTGRES_DB: fdih_dev
      POSTGRES_USER: fdih_user
      POSTGRES_PASSWORD: fdih_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fdih_user -d fdih_dev']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
